<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SharePoint Dev Lens</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    html, body { margin: 0; padding: 0; width: 300px; }
  </style>
</head>
<body class="popup-body">

  <div class="popup-header">
    <div class="popup-header-icon">🔍</div>
    <div>
      <div class="popup-header-title">SharePoint Dev Lens</div>
      <div class="popup-header-sub">Developer Inspector</div>
    </div>
  </div>

  <div class="popup-status" id="status-area">
    <div class="status-dot loading" id="status-dot"></div>
    <div class="status-text">
      <div class="status-title" id="status-title">Detecting page…</div>
      <div class="status-url" id="status-url"></div>
    </div>
  </div>

  <div class="popup-actions">
    <button class="btn btn-primary btn-full" id="open-panel-btn" disabled>
      Open Inspector Panel →
    </button>
  </div>

  <div class="popup-links hidden" id="quick-links">
    <div class="section-title" style="margin-bottom:6px">Quick Links</div>
    <div class="link-list" id="link-list"></div>
  </div>

  <div class="popup-footer">
    Not affiliated with Microsoft · v1.0.0
  </div>

  <script type="module" src="js/popup.js"></script>
</body>
</html>
