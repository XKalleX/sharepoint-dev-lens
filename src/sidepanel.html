<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SharePoint Dev Lens</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app">

  <header id="header">
    <div class="header-left">
      <img src="icons/icon48.png" alt="" class="header-icon" onerror="this.style.display='none'">
      <div>
        <div class="header-title">SharePoint Dev Lens</div>
        <div class="header-subtitle" id="header-site-name">–</div>
      </div>
    </div>
    <div class="header-right">
      <span class="badge badge-sp hidden" id="sp-badge">SP</span>
      <span class="badge badge-warn hidden" id="warn-badge"></span>
      <button class="icon-btn" id="refresh-btn" title="Refresh">↻</button>
    </div>
  </header>

  <nav class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-tab="site">🏠<span>Site</span></button>
    <button class="tab-btn" data-tab="lists" disabled>📋<span>Lists</span></button>
    <button class="tab-btn" data-tab="fields" disabled>🔍<span>Fields</span></button>
    <button class="tab-btn" data-tab="links">🔗<span>Links</span></button>
    <button class="tab-btn" data-tab="export" disabled>⬇<span>Export</span></button>
  </nav>

  <main class="tab-content" id="tab-content">
    <!-- Rendered dynamically by sidepanel.js -->
  </main>

</div>

<script type="module" src="js/sidepanel.js"></script>
</body>
</html>
